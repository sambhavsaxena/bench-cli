name: Release Admin Frontend

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Build admin frontend
        run: |
          cd admin/frontend
          npm install
          npm run build

      - name: Package dist
        run: |
          cd admin/backend/static
          tar -czf /tmp/admin-frontend.tar.gz dist/

      - name: Publish to GitHub Releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest-build --yes 2>/dev/null || true
          git push --delete origin latest-build 2>/dev/null || true
          gh release create latest-build \
            --prerelease \
            --title "Latest Admin Build" \
            --notes "Auto-generated admin frontend build from main." \
            /tmp/admin-frontend.tar.gz
