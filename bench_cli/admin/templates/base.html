<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>bench admin</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="layout">
    <header>
      <a class="header-brand" href="/">
        <span class="brand-icon">F</span>
        Bench
      </a>
      <nav>
        <a href="/apps" class="{{ 'active' if request.path.startswith('/apps') else '' }}">Apps</a>
        <a href="/sites" class="{{ 'active' if request.path.startswith('/sites') else '' }}">Sites</a>
        <a href="/processes" class="{{ 'active' if request.path.startswith('/processes') else '' }}">Processes</a>
        <a href="/logs" class="{{ 'active' if request.path.startswith('/logs') else '' }}">Logs</a>
        <a href="/database/binlogs" class="{{ 'active' if request.path.startswith('/database') else '' }}">Database</a>
        <a href="/tasks" class="{{ 'active' if request.path.startswith('/tasks') else '' }}">Tasks</a>
      </nav>
    </header>

    <main class="main">
      {% block content %}{% endblock %}
    </main>

    <footer>bench bench2 &middot;middot; reads filesystem on every request &middot; no state stored</footer>
  </div>
</body>
</html>
