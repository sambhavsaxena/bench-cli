rules:
- id: frappe-translation-empty-string
  pattern-either:
  - pattern: _("")
  - pattern: __("")
  message: |
    Empty string is useless for translation.
    Please refer: https://frappeframework.com/docs/user/en/translations
  languages: [python, javascript, json]
  severity: WARNING

- id: frappe-translation-variable-only
  pattern-either:
  - pattern: _("{}", ...)
  - pattern: _("{0}", ...)
  - pattern: _("{0} {1}", ...)
  - pattern: _("{0} {1} {2}", ...)
  - pattern: __("{}", ...)
  - pattern: __("{0}", ...)
  - pattern: __("{0} {1}", ...)
  - pattern: __("{0} {1} {2}", ...)
  message: |
    Tries to translate variables that are not known to the translators. It has the same effect as using the variables directly.
    Please refer: https://frappeframework.com/docs/user/en/translations
  languages: [python, javascript, json]
  severity: WARNING

- id: frappe-translation-trailing-spaces
  pattern-either:
    - pattern: _("=~/(^[ \t]+|[ \t]+$)/")
    - pattern: __("=~/(^[ \t]+|[ \t]+$)/")
  message: |
    Trailing or leading whitespace not allowed in translate strings.
    Please refer: https://frappeframework.com/docs/user/en/translations
  languages: [python, javascript, json]
  severity: WARNING

- id: frappe-translation-python-formatting
  pattern-either:
  - pattern: _("..." % ...)
  - pattern: _("...".format(...))
  - pattern: |
      $VAR = "..." % ...
      ...
      _($VAR)
  - pattern: |
      $VAR = "...".format(...)
      ...
      _($VAR)
  message: |
    Only positional formatters are allowed and formatting should not be done before translating.
    Please refer: https://frappeframework.com/docs/user/en/translations
  languages: [python]
  severity: WARNING

- id: frappe-translation-js-formatting
  patterns:
  - pattern: __(`...`)
  - pattern-not: __("...")
  message: |
    Template strings are not allowed for text formatting.
    Please refer: https://frappeframework.com/docs/user/en/translations
  languages: [javascript, json]
  severity: WARNING

- id: frappe-translation-python-splitting
  pattern-either:
  - pattern: _(...) + _(...)
  - pattern: _("..." + "...")
  - pattern-regex: '[\s\.]_\([^\)]*\\\s*'    # lines broken by `\`
  message: |
    Do not split strings inside translate function. Do not concatenate using translate functions.
    Please refer: https://frappeframework.com/docs/user/en/translations
  languages: [python]
  severity: WARNING

- id: frappe-translation-js-splitting
  pattern-either:
  - pattern-regex: '__\([^\)]*[\\]\s+'
  - pattern: __('...' + '...', ...)
  - pattern: __('...') + __('...')
  message: |
    Do not split strings inside translate function. Do not concatenate using translate functions.
    Please refer: https://frappeframework.com/docs/user/en/translations
  languages: [javascript, json]
  severity: WARNING

- id: frappe-untranslated-label-in-translated-message
  pattern: |
    _("...", ...).format(
      ...,
      self.meta.get_label(...),
      ...
    )
  message: |
    The label returned by `self.meta.get_label(...)` needs to be translated by wrapping it in `_()`.
  languages: [python]
  severity: WARNING
